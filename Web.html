<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ESP32 MQTT Controller</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="floating-particles"></div>
    
    <div class="container-fluid">
        <div class="main-container">
            <div id="connection-status" class="connection-status disconnected">
                <div class="status-dot"></div>
                <span>Connecting...</span>
            </div>
            
            <h1 class="page-title">Smart Switch System</h1>
            
            <div id="devices" class="device-grid">
                <!-- Device cards are generated by JS -->
            </div>
        </div>
    </div>

    <script>
        // Enhanced JavaScript with better UX
        const broker = 'wss://broker.hivemq.com:8884/mqtt';
        const options = {
            connectTimeout: 4000,
            clientId: 'webClient-' + Math.random().toString(16).substr(2, 8)
        };

        const client = mqtt.connect(broker, options);
        const activeTimers = {};
        const deviceStates = {};

        // Connection status management
        const connectionStatus = document.getElementById('connection-status');

        client.on('connect', () => {
            console.log('✅ Connected to MQTT broker');
            connectionStatus.className = 'connection-status connected';
            connectionStatus.innerHTML = '<div class="status-dot"></div><span>Connected</span>';
        });

        client.on('disconnect', () => {
            connectionStatus.className = 'connection-status disconnected';
            connectionStatus.innerHTML = '<div class="status-dot"></div><span>Disconnected</span>';
            showNotification('Disconnected from MQTT broker', 'error');
        });

        client.on('error', (error) => {
            console.error('MQTT Error:', error);
            showNotification('Connection error occurred', 'error');
        });

        const devices = [
            { id: "bulb", name: "Smart Bulb", icon: "fas fa-lightbulb", timer: true },
            { id: "plug", name: "Smart Plug", icon: "fas fa-plug", timer: true },
            { id: "fan", name: "Ceiling Fan", icon: "fas fa-fan", timer: true }
        ];

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation-triangle' : 'info'} me-2"></i>${message}`;
            document.body.appendChild(notification);

            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => document.body.removeChild(notification), 400);
            }, 3000);
        }

        function updateDeviceState(device, isActive) {
            deviceStates[device] = isActive;
            // Visual state updates removed
        }

        function sendCommand(device, state) {
            if (!client.connected) {
                showNotification('Not connected to MQTT broker', 'error');
                return;
            }

            const topic = `home/control/${device}`;
            client.publish(topic, state);
            console.log(`📤 Sent "${state}" to ${topic}`);
            
            updateDeviceState(device, state === 'ON');
        }

        function sendTimer(device) {
            const hours = parseInt(document.getElementById(`timer-hour-${device}`).value) || 0;
            const minutes = parseInt(document.getElementById(`timer-min-${device}`).value) || 0;
            const totalSeconds = (hours * 3600) + (minutes * 60);

            if (totalSeconds <= 0) {
                showNotification("Please enter a valid timer duration", 'error');
                return;
            }

            if (totalSeconds > 86400) { // 24 hours
                showNotification("Timer cannot exceed 24 hours", 'error');
                return;
            }

            // Clear existing timer for this device
            if (activeTimers[device]) {
                clearInterval(activeTimers[device]);
                delete activeTimers[device];
            }

            sendCommand(device, "ON");
            console.log(`🟢 ${device} turned ON for ${totalSeconds} seconds`);

            const countdownEl = document.getElementById(`countdown-${device}`);
            countdownEl.classList.add('active');
            let remaining = totalSeconds;

            activeTimers[device] = setInterval(() => {
                const hrs = Math.floor(remaining / 3600);
                const mins = Math.floor((remaining % 3600) / 60);
                const secs = remaining % 60;
                
                countdownEl.innerHTML = `<i class="fas fa-clock me-2"></i>Time left: ${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (--remaining < 0) {
                    clearInterval(activeTimers[device]);
                    delete activeTimers[device];
                    countdownEl.innerHTML = '<i class="fas fa-check me-2"></i>Timer completed!';
                    sendCommand(device, "OFF");
                    
                    setTimeout(() => {
                        countdownEl.classList.remove('active');
                    }, 3000);
                }
            }, 1000);

            // Clear input fields
            document.getElementById(`timer-hour-${device}`).value = '';
            document.getElementById(`timer-min-${device}`).value = '';
        }

        // Generate floating particles
        function createParticles() {
            const container = document.querySelector('.floating-particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                container.appendChild(particle);
            }
        }

        // Generate device cards
        devices.forEach(device => {
            document.getElementById("devices").innerHTML += `
                <div class="device-card" id="card-${device.id}">
                    <div class="card-body">
                        <div class="device-icon-container">
                            <div class="icon-glow"></div>
                            <i class="${device.icon} device-icon"></i>
                        </div>
                        <h5 class="card-title">${device.name}</h5>
                        <div class="control-buttons">
                            <button class="btn btn-modern btn-success-modern" onclick="sendCommand('${device.id}', 'ON')">
                                <i class="fas fa-power-off me-2"></i>ON
                            </button>
                            <button class="btn btn-modern btn-danger-modern" onclick="sendCommand('${device.id}', 'OFF')">
                                <i class="fas fa-times me-2"></i>OFF
                            </button>
                        </div>
                        ${device.timer ? `
                            <div class="timer-container">
                                <div class="timer-inputs">
                                    <input type="number" id="timer-hour-${device.id}" class="form-control timer-input" placeholder="Hours" min="0" max="23">
                                    <input type="number" id="timer-min-${device.id}" class="form-control timer-input" placeholder="Minutes" min="0" max="59">
                                </div>
                                <button class="btn btn-modern btn-success-modern" onclick="sendTimer('${device.id}')">
                                    <i class="fas fa-clock me-2"></i>Set Timer
                                </button>
                                <div id="countdown-${device.id}" class="countdown-display"></div>
                            </div>` : ''}
                    </div>
                </div>
            `;
        });

        // Initialize particles
        createParticles();

        // Add some interactive enhancements
        document.addEventListener('DOMContentLoaded', () => {
            // Add hover sound effect (optional)
            const buttons = document.querySelectorAll('.btn-modern');
            buttons.forEach(button => {
                button.addEventListener('mouseenter', () => {
                    // Subtle vibration on mobile
                    if (navigator.vibrate) {
                        navigator.vibrate(10);
                    }
                });
            });
        });
    </script>
</body>
</html>
